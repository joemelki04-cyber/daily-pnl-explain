name: Run Daily PnL Explain

on:
  workflow_dispatch:
    inputs:
      valuation_date:
        description: "Current valuation date (YYYY-MM-DD)"
        required: true
        default: "2026-03-15"
      prev_date:
        description: "Previous valuation date (optional, YYYY-MM-DD)"
        required: false
        default: ""

jobs:
  run-report:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily PnL Explain
        shell: bash
        run: |
          CMD="python src/pnl_explain.py --date ${{ github.event.inputs.valuation_date }}"

          if [ -n "${{ github.event.inputs.prev_date }}" ]; then
            CMD="$CMD --prev-date ${{ github.event.inputs.prev_date }}"
          fi

          echo "Running: $CMD"
          eval "$CMD"

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: pnl-report-${{ github.event.inputs.valuation_date }}
          path: |
            reports/
          if-no-files-found: error
